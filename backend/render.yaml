services:
  - type: web
    name: researchmind-ai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
