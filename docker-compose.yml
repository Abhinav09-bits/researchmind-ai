services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: researchmind_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: researchmind_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: researchmind
      POSTGRES_USER: researchmind
      POSTGRES_PASSWORD: researchmind_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_data:
